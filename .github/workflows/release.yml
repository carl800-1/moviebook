name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --windowed --name MovieBook-Linux gui.py
          mkdir -p dist/linux
          mv dist/MovieBook-Linux dist/linux/

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --windowed --name MovieBook-Windows.exe gui.py
          mkdir -p dist/windows
          mv dist/MovieBook-Windows.exe dist/windows/

      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onedir --windowed --name MovieBook gui.py
          mkdir -p dist/macos
          mv dist/MovieBook.app dist/macos/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MovieBook-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}